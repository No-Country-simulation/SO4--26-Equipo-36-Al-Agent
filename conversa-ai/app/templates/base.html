<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Conversa Pay{% endblock %}</title>
    
    <!-- CSS locally (DaisyUI & Custom) -->
    <link href="/static/css/daisyui.min.css" rel="stylesheet" type="text/css" />
    <style>
        /* Custom styles that aren't easily handled by JS Tailwind */
        :root {
            --primary-glow: #00F0FF; /* Electric Cyan */
            --bg-deep: #0B0E14;
        }
        body {
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .glass-panel {
            background: rgba(20, 25, 40, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-text {
            color: var(--primary-glow);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .neon-btn {
            background-color: var(--primary-glow);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: all 0.3s ease;
        }
        .neon-btn:hover {
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.7);
            transform: translateY(-2px);
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }
    </style>

    <!-- Tailwind JS locally for utility classes -->
    <script src="/static/js/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'neon-cyan': '#00F0FF',
                        'neon-emerald': '#00FF85',
                        'navy-deep': '#0B0E14',
                        'navy-card': '#151A27',
                    }
                }
            }
        }
    </script>

    <!-- HTMX locally -->
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/ws.js"></script>
</head>
<body class="min-h-screen flex flex-col">

    {% block content %}{% endblock %}

    <script>
        // Auto scroll to bottom of chat
        document.body.addEventListener('htmx:wsAfterMessage', function(e) {
            const chatHistory = document.getElementById('chat-history');
            if(chatHistory) {
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
            
            // Clear input
            const input = document.getElementById('user-message-input');
            if(input) input.value = '';
        });
    </script>
</body>
</html>
