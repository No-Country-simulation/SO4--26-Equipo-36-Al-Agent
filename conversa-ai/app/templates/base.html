<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Conversa Pay{% endblock %}</title>
    
    <!-- Google Fonts: Syne (Display) and DM Sans (Body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- CSS locally (DaisyUI & Custom) -->
    <link href="/static/css/daisyui.min.css" rel="stylesheet" type="text/css" />
    <style>
        :root {
            --primary-lime: #ccff00;
            --bg-obsidian: #050505;
            --border-color: #333333;
        }

        body {
            background-color: var(--bg-obsidian);
            color: #ffffff;
            font-family: 'DM Sans', sans-serif;
            position: relative;
        }

        /* Noise Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 9999;
        }

        h1, h2, h3, h4, h5, .font-display {
            font-family: 'Syne', sans-serif;
            text-transform: uppercase;
            letter-spacing: -0.02em;
        }

        /* Neo-Brutalist Classes */
        .brutal-border {
            border: 1px solid var(--border-color);
        }
        
        .brutal-box {
            background-color: var(--bg-obsidian);
            border: 1px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .brutal-box:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--border-color);
        }

        .brutal-box.lime {
            box-shadow: 4px 4px 0px var(--primary-lime);
            border-color: var(--primary-lime);
        }

        .brutal-box.lime:hover {
            box-shadow: 6px 6px 0px var(--primary-lime);
        }

        .brutal-btn {
            background-color: var(--primary-lime);
            color: var(--bg-obsidian);
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid var(--primary-lime);
            box-shadow: 4px 4px 0px var(--border-color);
            transition: all 0.1s ease;
        }

        .brutal-btn:hover {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--border-color);
        }

        .brutal-btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--border-color);
        }
        
        .brutal-btn-outline {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid var(--border-color);
            box-shadow: 4px 4px 0px var(--border-color);
        }

        .brutal-btn-outline:hover {
            border-color: var(--primary-lime);
            box-shadow: 4px 4px 0px var(--primary-lime);
            color: var(--primary-lime);
        }

        .text-lime {
            color: var(--primary-lime);
        }

        /* Animations */
        @keyframes staggered-fade-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-reveal {
            opacity: 0;
            animation: staggered-fade-up 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-obsidian);
            border-left: 1px solid var(--border-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-lime);
        }
    </style>

    <!-- Tailwind JS locally for utility classes -->
    <script src="/static/js/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'brand-lime': '#ccff00',
                        'brand-obsidian': '#050505',
                        'brand-border': '#333333',
                    },
                    fontFamily: {
                        'sans': ['"DM Sans"', 'sans-serif'],
                        'display': ['"Syne"', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- HTMX locally -->
    <script src="/static/js/htmx.min.js"></script>
    <script src="/static/js/ws.js"></script>
</head>
<body class="min-h-screen flex flex-col" data-session-id="{{ session_id | default('') }}">

    {% block content %}{% endblock %}

    <script>
        // Auto scroll to bottom of chat and play notification on bot response
        document.body.addEventListener('htmx:wsAfterMessage', function(e) {
            const chatHistory = document.getElementById('chat-history');
            if(chatHistory) {
                chatHistory.scrollTop = chatHistory.scrollHeight;
            }
            
            if (e.detail && e.detail.message) {
                if (e.detail.message.includes('id="response-')) {
                    const sound = document.getElementById('notification-sound');
                    if (sound) {
                        sound.volume = 0.3;
                        sound.play().catch(e => console.log('Audio autoplay prevented'));
                    }
                }
            }
        });
    </script>
</body>
</html>
