<div id="typing-indicator" class="chat chat-start flex flex-col gap-1 items-start w-full animate-reveal" hx-swap-oob="beforeend:#chat-history">
    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">[ CONVERSA ]</span>
    <div class="brutal-box bg-transparent border-brand-border p-4 w-fit flex items-center justify-center gap-1">
        <!-- Square geometric typing indicator -->
        <div class="w-2 h-2 bg-brand-lime animate-ping" style="animation-duration: 1.5s;"></div>
        <div class="w-2 h-2 bg-brand-lime animate-ping" style="animation-duration: 1.5s; animation-delay: 0.2s;"></div>
        <div class="w-2 h-2 bg-brand-lime animate-ping" style="animation-duration: 1.5s; animation-delay: 0.4s;"></div>
    </div>
</div>
