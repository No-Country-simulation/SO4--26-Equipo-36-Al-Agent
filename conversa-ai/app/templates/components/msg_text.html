<!-- User Message (if role == 'user') -->
{% if role == 'user' %}
<div class="chat chat-end flex flex-col gap-1 items-end w-full animate-reveal" hx-swap-oob="beforeend:#chat-history">
    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pr-1">[ USUARIO ]</span>
    <div class="brutal-box bg-brand-lime text-black border-brand-obsidian p-4 w-fit max-w-[85%] text-sm md:text-base leading-relaxed font-medium">
        {{ content }}
    </div>
</div>
{% else %}
<!-- Assistant Message -->
<div class="chat chat-start flex flex-col gap-1 items-start w-full animate-reveal" hx-swap-oob="beforeend:#chat-history">
    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">[ CONVERSA ]</span>
    <div class="brutal-box bg-transparent text-white border-brand-border p-4 w-fit max-w-[85%] text-sm md:text-base leading-relaxed" {% if msg_id %}id="response-{{ msg_id }}"{% endif %}>
        {{ content | safe }}
    </div>
</div>
{% endif %}
