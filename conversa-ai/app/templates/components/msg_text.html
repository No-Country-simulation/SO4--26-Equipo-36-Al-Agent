<!-- User Message (if role == 'user') -->
{% if role == 'user' %}
<div class="chat chat-end flex flex-col gap-1 items-end w-full animate-reveal" hx-swap-oob="beforeend:#chat-history">
    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pr-1">[ USUARIO ]</span>
    <div class="brutal-box bg-brand-lime text-black border-brand-obsidian p-4 w-fit max-w-[85%] text-sm md:text-base leading-relaxed font-medium">
        {{ content }}
    </div>
</div>
{% else %}
<!-- Assistant Message -->
<div id="msg-{{ msg_id }}" class="chat chat-start flex flex-col gap-1 items-start w-full animate-reveal" {% if is_update %}hx-swap-oob="true"{% else %}hx-swap-oob="beforeend:#chat-history"{% endif %}>
    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">[ CONVERSA ]</span>
    <div class="brutal-box bg-transparent text-white border-brand-border p-4 w-fit max-w-[85%] text-sm md:text-base leading-relaxed" {% if msg_id %}id="response-{{ msg_id }}"{% endif %}>
        {{ content | safe }}
    </div>
    {% if msg_id %}
    <!-- Feedback Buttons -->
    <div id="feedback-{{ msg_id }}" class="flex items-center gap-2 mt-1 pl-1">
        <button
            class="feedback-btn text-gray-500 hover:text-green-400 transition-colors p-1"
            hx-post="/api/v1/agent/feedback"
            hx-vals='{"message_id": "{{ msg_id }}", "rating": 1}'
            hx-target="#feedback-{{ msg_id }}"
            hx-swap="innerHTML"
            title="Respuesta útil"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14 10h4.764a2 2 0 011.789 2.894l-3.5 7A2 2 0 0115.263 21h-4.017c-.163 0-.326-.02-.485-.06L7 20m7-10V5a2 2 0 00-2-2h-.095c-.5 0-.905.405-.905.905 0 .714-.211 1.412-.608 2.006L7 11v9m7-10h-2M7 20H5a2 2 0 01-2-2v-6a2 2 0 012-2h2.5" />
            </svg>
        </button>
        <button
            class="feedback-btn text-gray-500 hover:text-red-400 transition-colors p-1"
            hx-post="/api/v1/agent/feedback"
            hx-vals='{"message_id": "{{ msg_id }}", "rating": -1}'
            hx-target="#feedback-{{ msg_id }}"
            hx-swap="innerHTML"
            title="Respuesta no útil"
        >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 14H5.236a2 2 0 01-1.789-2.894l3.5-7A2 2 0 018.736 3h4.018a2 2 0 01.485.06l3.76.94m-7 10v5a2 2 0 002 2h.096c.5 0 .905-.405.905-.904 0-.715.211-1.413.608-2.008L17 13V4m-7 10h2m5-10h2a2 2 0 012 2v6a2 2 0 01-2 2h-2.5" />
            </svg>
        </button>
    </div>
    {% endif %}
</div>
{% endif %}
