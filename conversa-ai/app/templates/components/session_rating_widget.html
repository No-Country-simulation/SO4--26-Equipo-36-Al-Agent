<!-- Widget de Calificación de 5 Estrellas -->
<div class="chat chat-start flex flex-col gap-1 items-start w-full animate-reveal" hx-swap-oob="beforeend:#chat-history">
    <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">[ SUCURSAL ]</span>
    <style>
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: flex-end;
            gap: 0.25rem;
        }
        .star-rating input {
            display: none;
        }
        .star-rating label {
            cursor: pointer;
            color: #6b7280; /* text-gray-500 */
            font-size: 2rem;
            transition: color 0.2s, transform 0.2s;
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label {
            color: #facc15; /* text-yellow-400 */
            transform: scale(1.2);
        }
        .star-rating input:checked ~ label {
            color: #facc15;
        }
    </style>
    <div id="session-rating-container" class="brutal-box bg-brand-obsidian border-brand-border p-4 w-fit flex flex-col gap-3">
        <p class="text-sm font-bold text-white uppercase tracking-wider">¿Cómo calificarías tu experiencia?</p>
        <form hx-post="/api/v1/agent/session-rating" hx-target="#session-rating-container" hx-swap="innerHTML" class="flex flex-col gap-3">
            <input type="hidden" name="session_id" value="{{ session_id }}">
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" required />
                <label for="star5" title="5 estrellas">★</label>
                <input type="radio" id="star4" name="rating" value="4" />
                <label for="star4" title="4 estrellas">★</label>
                <input type="radio" id="star3" name="rating" value="3" />
                <label for="star3" title="3 estrellas">★</label>
                <input type="radio" id="star2" name="rating" value="2" />
                <label for="star2" title="2 estrellas">★</label>
                <input type="radio" id="star1" name="rating" value="1" />
                <label for="star1" title="1 estrella">★</label>
            </div>
            <button type="submit" class="brutal-btn bg-brand-lime text-black border-2 border-brand-obsidian font-bold text-xs uppercase px-4 py-2 hover:bg-white transition-colors">
                Enviar Calificación
            </button>
        </form>
    </div>
</div>

<!-- OOB Swaps to disable input and end button -->
<fieldset id="chat-fieldset" hx-swap-oob="outerHTML" disabled class="contents">
    <div class="relative flex-1">
        <input 
            type="text" 
            id="user-message-input"
            name="user_message" 
            placeholder="La sesión ha finalizado..." 
            class="input w-full bg-gray-800 text-gray-500 border-2 border-gray-600 border-r-0 rounded-none focus:outline-none font-mono text-sm h-14"
            disabled
        />
    </div>
    <button type="submit" class="brutal-btn w-16 h-14 flex items-center justify-center shadow-none border-2 bg-gray-700 text-gray-500 border-gray-600 cursor-not-allowed" disabled>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
    </button>
</fieldset>

<button id="end-session-btn" hx-swap-oob="outerHTML" disabled
        class="btn btn-ghost btn-sm rounded-none text-gray-500 font-bold uppercase tracking-wider text-xs border border-gray-600 cursor-not-allowed"
        title="Sesión Finalizada">
    FINALIZADA
</button>
