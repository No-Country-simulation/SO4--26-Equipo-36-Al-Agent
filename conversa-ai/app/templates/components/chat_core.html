<!-- Chat container with HTMX WebSocket connection -->
<div hx-ext="ws" ws-connect="/api/v1/pages/ws/{{ session_id }}" class="flex flex-col w-full h-full bg-brand-obsidian overflow-hidden" style="flex-direction: column !important; width: 100% !important;">
    
    <!-- Chat Header -->
    <div class="bg-brand-obsidian p-4 border-b-2 border-brand-border flex items-center justify-between w-full shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 border-2 border-brand-border bg-white flex items-center justify-center">
                <!-- Sharp Geometric Assistant Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-obsidian" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="5" y="5" width="14" height="14" />
                    <circle cx="12" cy="12" r="3" fill="#ffffff" />
                </svg>
            </div>
            <div>
                <h3 class="font-display font-bold text-white text-lg tracking-tight uppercase">Conversa AI</h3>
                <p class="text-xs font-bold text-brand-lime flex items-center gap-1 tracking-widest uppercase">
                    <span class="w-2 h-2 rounded-none bg-brand-lime"></span>
                    En línea
                </p>
            </div>
        </div>
        
        <!-- Controls for pop-up version -->
        <div class="flex gap-2">
            <!-- Botón Finalizar Sesión -->
            <button id="end-session-btn" 
                    class="btn btn-ghost btn-sm rounded-none text-red-500 hover:text-white hover:bg-red-600 font-bold uppercase tracking-wider text-xs border border-red-500 hover:border-red-600"
                    hx-post="/api/v1/agent/close-session-form"
                    hx-vals='{"session_id": "{{ session_id }}"}'
                    hx-swap="none"
                    title="Finalizar Chat">
                FINALIZAR
            </button>
            
            {% if is_popup %}
            <a href="/chat?session_id={{ session_id }}" class="btn btn-ghost btn-sm rounded-none text-gray-400 hover:text-white hover:bg-brand-border" title="Pantalla Completa">
                <!-- Icono de Expandir (Flechas diagonales) -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 3 21 3 21 9"></polyline>
                    <line x1="9" y1="21" x2="21" y2="3"></line>
                    <polyline points="9 21 3 21 3 15"></polyline>
                    <line x1="21" y1="3" x2="3" y2="21"></line>
                </svg>
            </a>
            <button onclick="document.getElementById('chat-modal').close()" class="btn btn-ghost btn-sm rounded-none text-gray-400 hover:text-white hover:bg-brand-border">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
            {% endif %}
        </div>
    </div>

    <!-- Chat History -->
    <div id="chat-history" class="flex-1 p-6 overflow-y-auto flex flex-col gap-6 relative w-full" style="flex-direction: column !important; width: 100% !important;">
        <!-- Initial Welcome Message -->
        <div class="chat chat-start flex flex-col gap-1 items-start w-full animate-reveal">
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">[ CONVERSA ]</span>
            <div class="brutal-box bg-transparent text-white border-brand-border p-4 w-fit max-w-[85%] text-sm md:text-base leading-relaxed">
                ¡Hola! Soy el asistente virtual de Conversa Pay. Puedo ayudarte con consultas sobre productos, inversiones, tarjetas, comisiones, saldos y más. ¿En qué puedo asistirte hoy?
            </div>
        </div>
        
        <!-- Quick Reply Suggestions -->
        <div id="quick-replies" class="flex flex-wrap gap-2 pl-1 animate-reveal" style="animation-delay: 0.3s;">
            <button class="quick-reply-btn brutal-box bg-brand-obsidian text-brand-lime border-brand-border px-4 py-2 text-xs font-bold uppercase tracking-wider hover:bg-brand-lime hover:text-black transition-colors cursor-pointer" onclick="sendQuickReply(this, '¿Cuáles son los límites de transferencia?')">
                Límites de transferencia
            </button>
            <button class="quick-reply-btn brutal-box bg-brand-obsidian text-brand-lime border-brand-border px-4 py-2 text-xs font-bold uppercase tracking-wider hover:bg-brand-lime hover:text-black transition-colors cursor-pointer" onclick="sendQuickReply(this, '¿Qué tipos de cuenta ofrecen?')">
                Tipos de cuenta
            </button>
            <button class="quick-reply-btn brutal-box bg-brand-obsidian text-brand-lime border-brand-border px-4 py-2 text-xs font-bold uppercase tracking-wider hover:bg-brand-lime hover:text-black transition-colors cursor-pointer" onclick="sendQuickReply(this, '¿Cómo funciona el fondo de inversión?')">
                Inversiones
            </button>
        </div>
        
        <!-- We will append elements here dynamically via WS -->
        <div id="chat-end-anchor"></div>
    </div>

    <!-- Message Input -->
    <div class="p-4 bg-brand-obsidian border-t-2 border-brand-border w-full shrink-0">
        <form ws-send id="chat-form" class="flex gap-0">
            <fieldset id="chat-fieldset" class="contents">
                <div class="relative flex-1">
                    <input 
                        type="text" 
                        id="user-message-input"
                        name="user_message" 
                        placeholder="Escriba su consulta..." 
                        class="input w-full bg-brand-obsidian text-white border-2 border-brand-border border-r-0 rounded-none focus:outline-none focus:border-brand-lime font-mono text-sm h-14"
                        autocomplete="off"
                        required
                    />
                </div>
                <input type="hidden" name="browser_lang" id="browser-lang-input">
                <button type="submit" class="brutal-btn w-16 h-14 flex items-center justify-center shadow-none hover:translate-x-0 hover:translate-y-0 border-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
            </fieldset>
        </form>
    </div>
</div>

<script>
    // === Browser Language ===
    document.addEventListener("DOMContentLoaded", function() {
        const langInput = document.getElementById('browser-lang-input');
        if (langInput) {
            const lang = navigator.language || navigator.userLanguage || "es";
            langInput.value = lang.split('-')[0].toLowerCase();
        }
    });

    // === Input Clear Fix ===
    // Listen for HTMX WebSocket send events and clear the input after sending
    document.addEventListener('htmx:wsBeforeSend', function(event) {
        setTimeout(function() {
            const input = document.getElementById('user-message-input');
            if (input) {
                input.value = '';
                input.focus();
            }
        }, 50);
    });

    // === Quick Reply Handler ===
    function sendQuickReply(btn, message) {
        const input = document.getElementById('user-message-input');
        if (input) {
            input.value = message;
            // Trigger form submission
            const form = document.getElementById('chat-form');
            if (form) {
                // Set value and dispatch input event for HTMX
                input.dispatchEvent(new Event('input', { bubbles: true }));
                form.dispatchEvent(new Event('submit', { bubbles: true }));
            }
        }
        // Remove quick replies after selection
        const container = document.getElementById('quick-replies');
        if (container) container.remove();
    }

    // === Auto-scroll to Bottom ===
    const chatHistoryObserver = new MutationObserver(function(mutations) {
        const chatHistory = document.getElementById('chat-history');
        if (chatHistory) {
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    });
    const chatHistory = document.getElementById('chat-history');
    if (chatHistory) {
        chatHistoryObserver.observe(chatHistory, { childList: true, subtree: true });
    }

    // === Session Timeout (5 minutes inactivity) ===
    let inactivityTimer = null;
    const TIMEOUT_MS = 300000; // 5 minutes

    function resetInactivityTimer() {
        if (inactivityTimer) clearTimeout(inactivityTimer);
        inactivityTimer = setTimeout(function() {
            // Unify timeout closure with the backend via HTMX
            htmx.ajax('POST', '/api/v1/agent/close-session-form', {
                values: { 
                    'session_id': '{{ session_id }}',
                    'timeout': true
                },
                swap: 'none' // The response handles OOB swaps
            });
        }, TIMEOUT_MS);
    }

    // Reset timer on any user interaction
    document.addEventListener('htmx:wsBeforeSend', resetInactivityTimer);
    document.addEventListener('keypress', resetInactivityTimer);
    document.addEventListener('click', resetInactivityTimer);
    resetInactivityTimer(); // Start on page load
</script>
