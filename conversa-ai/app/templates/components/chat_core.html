<!-- Chat container with HTMX WebSocket connection -->
<div hx-ext="ws" ws-connect="/api/v1/pages/ws/{{ session_id }}" class="flex flex-col h-full bg-brand-obsidian overflow-hidden">
    
    <!-- Chat Header -->
    <div class="bg-brand-obsidian p-4 border-b-2 border-brand-border flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 border-2 border-brand-border bg-white flex items-center justify-center">
                <!-- Sharp Geometric Assistant Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-brand-obsidian" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="5" y="5" width="14" height="14" />
                    <circle cx="12" cy="12" r="3" fill="#ffffff" />
                </svg>
            </div>
            <div>
                <h3 class="font-display font-bold text-white text-lg tracking-tight uppercase">Motor Cognitivo</h3>
                <p class="text-xs font-bold text-brand-lime flex items-center gap-1 tracking-widest uppercase">
                    <span class="w-2 h-2 rounded-none bg-brand-lime"></span>
                    En línea
                </p>
            </div>
        </div>
        
        <!-- Controls for pop-up version -->
        {% if is_popup %}
        <div class="flex gap-2">
            <a href="/chat" class="btn btn-ghost btn-sm rounded-none text-gray-400 hover:text-white hover:bg-brand-border" title="Pantalla Completa">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M5 8a1 1 0 011-1h1V6H5a3 3 0 00-3 3v2h2V9a1 1 0 011-1h2V7H6a1 1 0 01-1 1zM15 12a1 1 0 01-1 1h-1v2h2a3 3 0 003-3v-2h-2v1a1 1 0 01-1 1h-2v2h1a1 1 0 011-1zM5 12a1 1 0 01-1 1v1a3 3 0 003 3h2v-2H6a1 1 0 01-1-1v-2H3v2h2zM15 8a1 1 0 011-1v-1a3 3 0 00-3-3h-2v2h1a1 1 0 011 1v2h2V8h-2z" />
                </svg>
            </a>
            <button onclick="document.getElementById('chat-modal').close()" class="btn btn-ghost btn-sm rounded-none text-gray-400 hover:text-white hover:bg-brand-border">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
        {% endif %}
    </div>

    <!-- Chat History -->
    <div id="chat-history" class="flex-1 p-6 overflow-y-auto flex flex-col gap-6 relative">
        <!-- Initial Welcome Message -->
        <div class="chat chat-start flex flex-col gap-1 items-start w-full animate-reveal">
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest pl-1">[ CONVERSA ]</span>
            <div class="brutal-box bg-transparent text-white border-brand-border p-4 w-fit max-w-[85%] text-sm md:text-base leading-relaxed">
                Sistema operativo inicializado. Soy tu agente financiero estructurado. Ingresa una consulta o directiva para proceder.
            </div>
        </div>
        
        <!-- We will append elements here dynamically via WS -->
        <div id="chat-end-anchor"></div>
    </div>

    <!-- Message Input -->
    <div class="p-4 bg-brand-obsidian border-t-2 border-brand-border">
        <form ws-send id="chat-form" class="flex gap-0">
            <div class="relative flex-1">
                <input 
                    type="text" 
                    id="user-message-input"
                    name="user_message" 
                    placeholder="Escriba su comando..." 
                    class="input w-full bg-brand-obsidian text-white border-2 border-brand-border border-r-0 rounded-none focus:outline-none focus:border-brand-lime font-mono text-sm h-14"
                    autocomplete="off"
                    required
                />
            </div>
            <button type="submit" class="brutal-btn w-16 h-14 flex items-center justify-center shadow-none hover:translate-x-0 hover:translate-y-0 border-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </form>
    </div>
</div>
