<!-- Chat container with HTMX WebSocket connection -->
<div hx-ext="ws" ws-connect="/api/v1/pages/ws/{{ session_id }}" class="flex flex-col h-full bg-navy-card rounded-2xl overflow-hidden shadow-2xl border border-gray-800">
    
    <!-- Chat Header -->
    <div class="bg-gray-900 bg-opacity-80 backdrop-blur-md p-4 border-b border-gray-800 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-neon-cyan to-blue-600 flex items-center justify-center text-white font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                </svg>
            </div>
            <div>
                <h3 class="font-semibold text-white">ConversaAI Assistant</h3>
                <p class="text-xs text-neon-cyan flex items-center gap-1">
                    <span class="w-2 h-2 rounded-full bg-neon-cyan animate-pulse"></span>
                    Online
                </p>
            </div>
        </div>
        
        <!-- Controls for pop-up version -->
        {% if is_popup %}
        <div class="flex gap-2">
            <a href="/chat" class="btn btn-ghost btn-sm btn-circle text-gray-400 hover:text-white" title="Expand">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M5 8a1 1 0 011-1h1V6H5a3 3 0 00-3 3v2h2V9a1 1 0 011-1h2V7H6a1 1 0 01-1 1zM15 12a1 1 0 01-1 1h-1v2h2a3 3 0 003-3v-2h-2v1a1 1 0 01-1 1h-2v2h1a1 1 0 011-1zM5 12a1 1 0 01-1 1v1a3 3 0 003 3h2v-2H6a1 1 0 01-1-1v-2H3v2h2zM15 8a1 1 0 011-1v-1a3 3 0 00-3-3h-2v2h1a1 1 0 011 1v2h2V8h-2z" />
                </svg>
            </a>
            <button onclick="document.getElementById('chat-modal').close()" class="btn btn-ghost btn-sm btn-circle text-gray-400 hover:text-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>
        {% endif %}
    </div>

    <!-- Chat History -->
    <div id="chat-history" class="flex-1 p-4 overflow-y-auto flex flex-col gap-4">
        <!-- Initial Welcome Message -->
        <div class="chat chat-start">
            <div class="chat-image avatar">
                <div class="w-10 rounded-full bg-gray-800 p-2 border border-gray-700">
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-neon-cyan" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                </div>
            </div>
            <div class="chat-bubble bg-gray-800 text-gray-200">
                ¡Hola! Soy tu asistente de Conversa Pay. ¿En qué te puedo ayudar hoy?
            </div>
        </div>
        
        <!-- We will append elements here dynamically via WS -->
        <div id="chat-end-anchor"></div>
    </div>

    <!-- Message Input -->
    <div class="p-3 bg-gray-900 border-t border-gray-800">
        <form ws-send id="chat-form" class="flex gap-2">
            <div class="relative flex-1">
                <input 
                    type="text" 
                    id="user-message-input"
                    name="user_message" 
                    placeholder="Escribe tu mensaje aquí..." 
                    class="input w-full bg-gray-800 text-white border-gray-700 focus:border-neon-cyan focus:ring-1 focus:ring-neon-cyan rounded-full pl-4 pr-10"
                    autocomplete="off"
                    required
                />
            </div>
            <button type="submit" class="btn btn-circle bg-neon-cyan text-black hover:bg-white border-none shadow-[0_0_10px_rgba(0,240,255,0.3)]">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 ml-1" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                </svg>
            </button>
        </form>
    </div>
</div>
